<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Default <title> only. Per-page tags (description, og:title,
         og:description, twitter:title, twitter:description) are
         injected by <PublicSEO> via react-helmet-async. We deliberately
         do NOT ship static defaults for those: helmet-async appends
         alongside existing static tags rather than replacing them, so
         a static default would leave every public page with two of
         each tag and crawlers/social previews picking the wrong one.
         Helmet handles <title> uniqueness natively (the browser
         enforces a single title element), so keeping the static title
         is safe and gives no-JS crawlers a sensible fallback. -->
    <title>Thiqa | نظام إدارة وكالات التأمين</title>

    <!-- Default crawl posture: index, follow. The previous default of
         noindex was a footgun: Google explicitly skips JS rendering
         when the initial HTML carries noindex (see "noindex" in the
         crawler docs), which meant the per-page <PublicSEO> override
         to "index, follow" never reached the index for marketing /
         pricing / FAQ pages. CRM and admin routes mount inside
         MainLayout, which carries a <NoIndex> Helmet entry so they
         still stay out of search. -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <meta name="author" content="Thiqa" />
    <meta name="publisher" content="Thiqa" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-title" content="Thiqa" />
    <meta name="application-name" content="Thiqa" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://thiqacrm.b-cdn.net" crossorigin />
    <link rel="preload" as="image" href="https://thiqacrm.b-cdn.net/small_white.png" fetchpriority="high" />
    <link rel="preload" as="image" href="https://thiqacrm.b-cdn.net/small_black.png" fetchpriority="high" />

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Simona Pro';
        src: url('https://fonts.gstatic.com/s/heebo/v26/NGSpv5_NC0k9P_v6ZUCbLRAHxK1E1yysdg.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
    </style>
    <script src="//cdn.asprise.com/scannerjs/scanner.js" type="text/javascript" defer></script>

    <!-- Open Graph / Twitter invariants only. og:title, og:description,
         twitter:title, twitter:description are injected per-page by
         PublicSEO via react-helmet-async — see the <title> comment
         above for why static defaults for those are removed. -->
    <meta property="og:site_name" content="Thiqa" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:title" content="Thiqa | نظام إدارة وكالات التأمين" />
    <meta property="og:description" content="ثقة — منصة متكاملة لإدارة وكالات التأمين: العملاء، الوثائق، المحاسبة، والتقارير، بواجهة عربية حديثة." />
    <meta name="twitter:title" content="Thiqa | نظام إدارة وكالات التأمين" />
    <meta name="twitter:description" content="ثقة — منصة متكاملة لإدارة وكالات التأمين: العملاء، الوثائق، المحاسبة، والتقارير، بواجهة عربية حديثة." />

    <meta property="og:image" content="https://thiqacrm.b-cdn.net/fav.png">
    <meta property="og:image:secure_url" content="https://thiqacrm.b-cdn.net/fav.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@getthiqa" />
    <meta name="twitter:image" content="https://thiqacrm.b-cdn.net/fav.png">

    <!-- Sitewide JSON-LD @graph: Organization + WebSite (with
         SearchAction) + SoftwareApplication. Lives in the static head
         so crawlers and the Rich Results Test see it on every page
         without waiting on JS. Per-page schemas (BreadcrumbList,
         FAQPage on /, etc.) layer on via react-helmet-async; @id
         references resolve across @graph blocks. -->
    <script id="schema-sitewide" type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://getthiqa.com/#org","name":"Thiqa","alternateName":"ثقة","url":"https://getthiqa.com/","logo":"https://thiqacrm.b-cdn.net/small_black.png","image":"https://thiqacrm.b-cdn.net/fav.png","email":"support@getthiqa.com","contactPoint":[{"@type":"ContactPoint","contactType":"customer support","telephone":"+972-52-514-3581","email":"support@getthiqa.com","availableLanguage":["Arabic","Hebrew","English"],"areaServed":["IL","PS"]}],"sameAs":["https://www.facebook.com/getthiqa","https://www.instagram.com/getthiqa"]},{"@type":"WebSite","@id":"https://getthiqa.com/#website","url":"https://getthiqa.com/","name":"Thiqa","alternateName":"ثقة","inLanguage":"ar","publisher":{"@id":"https://getthiqa.com/#org"},"potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://getthiqa.com/?q={search_term_string}"},"query-input":"required name=search_term_string"}},{"@type":"SoftwareApplication","@id":"https://getthiqa.com/#software","name":"Thiqa","applicationCategory":"BusinessApplication","applicationSubCategory":"Insurance Agency Management","operatingSystem":"Web Browser","url":"https://getthiqa.com/","publisher":{"@id":"https://getthiqa.com/#org"},"offers":{"@type":"Offer","price":"0","priceCurrency":"USD","description":"Free 35-day trial, no credit card required"},"inLanguage":["ar","he","en"]}]}</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
