<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title/description. Per-page <PublicSEO> overrides these
         for marketing/auth/legal pages and switches robots to "index". -->
    <title>Thiqa | نظام إدارة وكالات التأمين</title>
    <meta name="description" content="Thiqa — نظام سحابي متكامل لإدارة وكالات التأمين: العملاء، الوثائق، الأقساط، التحصيل، التقارير، والتنبيهات. جرّب مجاناً." />

    <!-- Default crawl posture: noindex. Public marketing/auth/legal
         pages override this via <PublicSEO> to "index, follow". CRM
         and admin routes inherit the default and stay out of search. -->
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://thiqacrm.b-cdn.net" crossorigin />
    <link rel="preload" as="image" href="https://thiqacrm.b-cdn.net/small_white.png" fetchpriority="high" />
    <link rel="preload" as="image" href="https://thiqacrm.b-cdn.net/small_black.png" fetchpriority="high" />

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Simona Pro';
        src: url('https://fonts.gstatic.com/s/heebo/v26/NGSpv5_NC0k9P_v6ZUCbLRAHxK1E1yysdg.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
    </style>
    <script src="//cdn.asprise.com/scannerjs/scanner.js" type="text/javascript"></script>

    <!-- Open Graph / Twitter defaults — overridden per page. -->
    <meta property="og:site_name" content="Thiqa" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:title" content="Thiqa | نظام إدارة وكالات التأمين" />
    <meta property="og:description" content="نظام سحابي متكامل لإدارة وكالات التأمين بالعربية. جرّب مجاناً." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thiqa | نظام إدارة وكالات التأمين" />
    <meta name="twitter:description" content="نظام سحابي متكامل لإدارة وكالات التأمين بالعربية. جرّب مجاناً." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
